<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,follow">
<title>Página no encontrada — Sandra Mangas</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zilla+Slab:wght@600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<script>
(function () {
  var p = location.pathname;
  // URLs antiguas de WordPress que ya no existen: llévalas a la home.
  var oldWp = /^\/(category|tag|author|page|feed|wp-content|wp-includes|wp-admin|comments|search)\b|\/(comment-page-\d+|feed|amp)\/?$|\/\?/i;
  if (oldWp.test(p) || oldWp.test(location.search)) {
    location.replace("https://sandramangas.com/");
  }
})();
</script>
<script src="/privacy.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#EDE7DA;color:#2A363D;font-family:'Source Sans 3',system-ui,sans-serif;padding:40px 20px;text-align:center}
  .box{max-width:520px}
  .code{font:700 13px 'Source Sans 3';letter-spacing:.22em;text-transform:uppercase;color:#C9485A;margin:0 0 12px}
  h1{font:700 34px/1.2 'Zilla Slab',serif;color:#1F2A30;margin:0 0 14px}
  p{font-size:17px;line-height:1.6;color:#5A656D;margin:0 0 28px}
  a.btn{display:inline-block;background:#C9485A;color:#fff;text-decoration:none;font-weight:600;font-size:16px;padding:13px 28px;border-radius:8px}
  a.btn:hover{background:#B23C4D}
</style>
</head>
<body>
  <div class="box">
    <p class="code">Error 404</p>
    <h1>Esta página ya no está aquí</h1>
    <p>Puede que el enlace sea antiguo o que la entrada se haya movido. Vuelve al inicio para encontrar lo que buscas.</p>
    <a class="btn" href="https://sandramangas.com/">Ir al inicio</a>
  </div>
</body>
</html>
